backend:
  name: github
  repo: your-org/personal-finance # TODO: Update with actual GitHub repo
  branch: main

media_folder: static
public_folder: /

collections:
  - name: docs
    label: Docs
    folder: docs
    create: true
    slug: '{{slug}}'
    fields:
      - { name: 'title', widget: 'string' }
      - { name: 'sidebar_label', widget: 'string' }
      - { name: 'body', widget: 'markdown' }